# Production stack for the membership backend (run on your server).
#
#   cp .env.production.example .env.production     # fill in REAL values
#   docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build
#
# IMPORTANT: when using THIS compose, set these hosts in .env.production to the
# service names below (not localhost):
#     DB_URL=jdbc:mysql://mysql:3306/membership_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Bangkok
#     DB_USER=root
#     REDIS_HOST=redis
#     RMQ_HOST=rabbitmq
# Put this server behind nginx + HTTPS (APP_ENV=PROD sets Secure cookies).

services:
  app:
    build: .                          # uses the existing Dockerfile (builds the .war)
    container_name: membership-app
    restart: unless-stopped
    env_file: .env.production
    ports:
      # Bind to localhost only — the host nginx (HTTPS) is the public entrypoint.
      - "127.0.0.1:8080:8080"
    depends_on:
      mysql:    { condition: service_healthy }
      redis:    { condition: service_healthy }
      rabbitmq: { condition: service_healthy }

  mysql:
    image: mysql:8.0
    container_name: membership-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}      # app connects as root with DB_PASSWORD
      MYSQL_DATABASE: membership_db
      TZ: Asia/Bangkok
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+07:00
    volumes:
      - mysql-data:/var/lib/mysql
      # First init only: creates all 53 tables (app + Quartz) from the dumped schema.
      - ./src/main/resources/db/schema-prod.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    container_name: membership-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: membership-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RMQ_PASSWORD}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    # management UI on 15672 is intentionally NOT published; expose via SSH tunnel if needed.
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
